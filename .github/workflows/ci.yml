name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate and build
        run: ./scripts/ci-check.sh
      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-ipk
          path: |
            dist/*.ipk
            dist/SHA256SUMS
