name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Validate workflow files
        uses: raven-actions/actionlint@205b530c5d9fa8f44ae9ed59f341a0db994aa6f8 # v2
        with:
          version: 1.7.7
          shellcheck: false
          pyflakes: false
      - name: Check shell scripts
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          severity: error
          version: v0.10.0
      - name: Scan Git history for secrets
        shell: bash
        run: |
          version=8.24.3
          archive="gitleaks_${version}_linux_x64.tar.gz"
          curl --fail --location --silent --show-error \
            "https://github.com/gitleaks/gitleaks/releases/download/v${version}/${archive}" \
            --output "/tmp/${archive}"
          echo "9991e0b2903da4c8f6122b5c3186448b927a5da4deef1fe45271c3793f4ee29c  /tmp/${archive}" |
            sha256sum --check
          tar -xzf "/tmp/${archive}" -C /tmp gitleaks
          /tmp/gitleaks git --no-banner --redact --log-opts="--all"

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Validate and build
        run: ./scripts/ci-check.sh
      - name: Upload IPK
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openwrt-ipk
          path: |
            dist/*.ipk
            dist/SHA256SUMS
