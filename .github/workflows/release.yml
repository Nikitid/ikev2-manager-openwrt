name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - name: Verify tag
        run: ./scripts/check-release-tag.sh "${GITHUB_REF_NAME}"
      - name: Validate and build
        run: ./scripts/ci-check.sh
      - name: Install OpenWrt SDK build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential file gawk gettext libncurses-dev libssl-dev \
            rsync unzip zlib1g-dev zstd
      - name: Download verified OpenWrt 25.12 SDK
        run: |
          . ./apk-feed.env
          mkdir -p build
          curl --fail --location --silent --show-error \
            "https://downloads.openwrt.org/releases/${OPENWRT_APK_VERSION}/targets/${OPENWRT_APK_TARGET}/${OPENWRT_APK_SDK_ARCHIVE}" \
            --output "build/${OPENWRT_APK_SDK_ARCHIVE}"
          printf '%s  %s\n' \
            "$OPENWRT_APK_SDK_SHA256" "build/${OPENWRT_APK_SDK_ARCHIVE}" |
            sha256sum --check
          tar --use-compress-program=unzstd -xf \
            "build/${OPENWRT_APK_SDK_ARCHIVE}" -C build
      - name: Prepare APK release signing key
        env:
          SIGNING_KEY: ${{ secrets.OPENWRT_APK_SIGNING_KEY }}
        run: |
          test -n "$SIGNING_KEY" || {
            echo 'OPENWRT_APK_SIGNING_KEY is not configured' >&2
            exit 1
          }
          umask 077
          printf '%s\n' "$SIGNING_KEY" > /tmp/ikev2-manager-apk-release.pem
      - name: Download signed Overview Manager APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          . ./apk-feed.env
          overview_apk="$(
            ./scripts/download-release-apk.sh \
              "$OPENWRT_OVERVIEW_REPOSITORY" \
              "$OPENWRT_OVERVIEW_PACKAGE" latest \
              "$RUNNER_TEMP/shared-apks"
          )"
          printf 'OPENWRT_OVERVIEW_MANAGER_APK=%s\n' "$overview_apk" \
            >>"$GITHUB_ENV"
      - name: Build signed OpenWrt 25.12 APK feed
        run: |
          . ./apk-feed.env
          OPENWRT_SDK_DIR="$PWD/build/${OPENWRT_APK_SDK_ARCHIVE%.tar.zst}" \
          OPENWRT_APK_SIGNING_KEY=/tmp/ikev2-manager-apk-release.pem \
          OPENWRT_APK_RELEASE_TAG="$GITHUB_REF_NAME" \
            ./scripts/build-apk-feed.sh
      - name: Remove APK release signing key
        if: ${{ always() }}
        run: rm -f /tmp/ikev2-manager-apk-release.pem
      - name: Publish release assets
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '_rc') || contains(github.ref_name, '_beta') || contains(github.ref_name, '_alpha') }}
          files: |
            dist/*.ipk
            dist/SHA256SUMS
            dist/apk-feed/*
      - name: Publish stable APK channel
        if: ${{ !contains(github.ref_name, '_rc') && !contains(github.ref_name, '_beta') && !contains(github.ref_name, '_alpha') }}
        run: |
          channel_dir="$RUNNER_TEMP/ikev2-manager-apk-channel"
          if git ls-remote --exit-code --heads origin refs/heads/apk-feed >/dev/null; then
            git fetch origin refs/heads/apk-feed:refs/remotes/origin/apk-feed
            git worktree add -b apk-feed "$channel_dir" origin/apk-feed
          else
            git worktree add --detach "$channel_dir"
            git -C "$channel_dir" switch --orphan apk-feed
          fi
          rm -f "$channel_dir"/luci-app-ikev2-manager-*.apk \
            "$channel_dir"/luci-app-overview-manager-*.apk
          cp dist/apk-feed/packages.adb \
            dist/apk-feed/ikev2-manager-release.pem \
            dist/apk-feed/nikitid-openwrt-release.pem \
            dist/apk-feed/SHA256SUMS.apk \
            dist/apk-feed/install-openwrt25.sh \
            dist/apk-feed/*.apk \
            "$channel_dir/"
          git -C "$channel_dir" config user.name 'github-actions[bot]'
          git -C "$channel_dir" config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git -C "$channel_dir" add packages.adb \
            ikev2-manager-release.pem nikitid-openwrt-release.pem \
            SHA256SUMS.apk install-openwrt25.sh '*.apk'
          if ! git -C "$channel_dir" diff --cached --quiet; then
            git -C "$channel_dir" commit -m "feed: ${GITHUB_REF_NAME}"
            git -C "$channel_dir" push origin HEAD:apk-feed
          fi
