name: Shared APK feed

on:
  workflow_dispatch:
    inputs:
      ikev2_release_tag:
        description: IKEv2 Manager release tag or latest
        required: false
        default: latest
      overview_release_tag:
        description: Overview Manager release tag or latest
        required: false
        default: latest
  repository_dispatch:
    types:
      - overview-manager-release

permissions:
  contents: write

concurrency:
  group: shared-apk-feed
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - name: Install OpenWrt SDK build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            build-essential file gawk gettext libncurses-dev libssl-dev \
            rsync unzip zlib1g-dev zstd
      - name: Download verified OpenWrt 25.12 SDK
        run: |
          . ./apk-feed.env
          mkdir -p build
          curl --fail --location --silent --show-error \
            "https://downloads.openwrt.org/releases/${OPENWRT_APK_VERSION}/targets/${OPENWRT_APK_TARGET}/${OPENWRT_APK_SDK_ARCHIVE}" \
            --output "build/${OPENWRT_APK_SDK_ARCHIVE}"
          printf '%s  %s\n' \
            "$OPENWRT_APK_SDK_SHA256" "build/${OPENWRT_APK_SDK_ARCHIVE}" |
            sha256sum --check
          tar --use-compress-program=unzstd -xf \
            "build/${OPENWRT_APK_SDK_ARCHIVE}" -C build
      - name: Prepare shared APK signing key
        env:
          SIGNING_KEY: ${{ secrets.OPENWRT_APK_SIGNING_KEY }}
        run: |
          test -n "$SIGNING_KEY" || {
            echo 'OPENWRT_APK_SIGNING_KEY is not configured' >&2
            exit 1
          }
          umask 077
          printf '%s\n' "$SIGNING_KEY" >/tmp/nikitid-openwrt-release.pem
      - name: Download signed application releases
        env:
          GH_TOKEN: ${{ github.token }}
          IKEV2_TAG: ${{ github.event.client_payload.ikev2_tag || inputs.ikev2_release_tag || 'latest' }}
          OVERVIEW_TAG: ${{ github.event.client_payload.overview_tag || inputs.overview_release_tag || 'latest' }}
        run: |
          . ./apk-feed.env
          ikev2_apk="$(
            ./scripts/download-release-apk.sh \
              "$OPENWRT_IKEV2_REPOSITORY" \
              "$OPENWRT_IKEV2_PACKAGE" "$IKEV2_TAG" \
              "$RUNNER_TEMP/shared-apks"
          )"
          overview_apk="$(
            ./scripts/download-release-apk.sh \
              "$OPENWRT_OVERVIEW_REPOSITORY" \
              "$OPENWRT_OVERVIEW_PACKAGE" "$OVERVIEW_TAG" \
              "$RUNNER_TEMP/shared-apks"
          )"
          printf 'OPENWRT_IKEV2_APK=%s\n' "$ikev2_apk" >>"$GITHUB_ENV"
          printf 'OPENWRT_OVERVIEW_MANAGER_APK=%s\n' "$overview_apk" \
            >>"$GITHUB_ENV"
      - name: Assemble and verify shared feed
        run: |
          . ./apk-feed.env
          OPENWRT_SDK_DIR="$PWD/build/${OPENWRT_APK_SDK_ARCHIVE%.tar.zst}" \
          OPENWRT_APK_SIGNING_KEY=/tmp/nikitid-openwrt-release.pem \
            ./scripts/assemble-shared-apk-feed.sh
      - name: Remove APK signing key
        if: ${{ always() }}
        run: rm -f /tmp/nikitid-openwrt-release.pem
      - name: Publish stable APK channel
        run: |
          channel_dir="$RUNNER_TEMP/nikitid-openwrt-apk-channel"
          git fetch origin refs/heads/apk-feed:refs/remotes/origin/apk-feed
          git worktree add -b apk-feed "$channel_dir" origin/apk-feed
          rm -f "$channel_dir"/luci-app-ikev2-manager-*.apk \
            "$channel_dir"/luci-app-overview-manager-*.apk
          cp dist/apk-feed/packages.adb \
            dist/apk-feed/ikev2-manager-release.pem \
            dist/apk-feed/nikitid-openwrt-release.pem \
            dist/apk-feed/SHA256SUMS.apk \
            dist/apk-feed/install-openwrt25.sh \
            dist/apk-feed/*.apk \
            "$channel_dir/"
          git -C "$channel_dir" config user.name 'github-actions[bot]'
          git -C "$channel_dir" config user.email \
            '41898282+github-actions[bot]@users.noreply.github.com'
          git -C "$channel_dir" add packages.adb \
            ikev2-manager-release.pem nikitid-openwrt-release.pem \
            SHA256SUMS.apk install-openwrt25.sh '*.apk'
          if ! git -C "$channel_dir" diff --cached --quiet; then
            git -C "$channel_dir" commit -m 'feed: refresh shared applications'
            git -C "$channel_dir" push origin HEAD:apk-feed
          fi
